<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Chest X-Ray Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="min-h-screen flex flex-col items-center justify-center px-4 py-10">
    <!-- Card -->
    <div class="w-full max-w-xl bg-slate-900/80 border border-slate-700 rounded-2xl shadow-xl p-6 md:p-8">
      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl md:text-3xl font-bold tracking-tight">
            AI Chest X-Ray Analyzer
          </h1>
          <p class="text-sm text-slate-400 mt-1">
            Upload a chest X‑ray image to check if it looks <span class="font-semibold text-emerald-300">Normal</span> or shows signs of <span class="font-semibold text-rose-300">Pneumonia</span>.
          </p>
        </div>
        <div class="hidden md:flex flex-col items-end text-right text-xs text-slate-500">
          <span>Model Acc: ~79.5%</span>
          <span>Binary CNN · 256×256 grayscale</span>
        </div>
      </div>

      <!-- Upload area -->
      <form id="upload-form" class="space-y-5">
        <label
          for="image-input"
          class="block border-2 border-dashed border-slate-700 rounded-xl p-6 cursor-pointer hover:border-emerald-400/80 transition-colors bg-slate-900/60"
        >
          <div class="flex flex-col items-center space-y-3">
            <div
              class="h-12 w-12 rounded-full bg-slate-800 flex items-center justify-center text-emerald-300 border border-slate-700"
            >
              ⤴
            </div>
            <div class="text-center">
              <p class="font-semibold">Drop your X‑ray here, or click to browse</p>
              <p class="text-xs text-slate-400 mt-1">
                Supported formats: JPG, JPEG, PNG
              </p>
            </div>
          </div>
          <input
            type="file"
            name="image"
            id="image-input"
            accept="image/*"
            class="hidden"
            required
          />
        </label>

        <!-- Preview -->
        <div id="preview-container" class="hidden">
          <p class="text-xs font-semibold text-slate-400 mb-2">Preview</p>
          <img
            id="preview-image"
            src=""
            alt="Selected X-ray"
            class="w-full max-h-72 object-contain rounded-xl border border-slate-700 bg-black/30"
          />
        </div>

        <!-- Submit button -->
        <button
          type="submit"
          class="w-full inline-flex items-center justify-center px-4 py-2.5 rounded-xl bg-emerald-500 text-slate-950 font-semibold text-sm hover:bg-emerald-400 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
        >
          <span id="button-text">Analyze X‑ray</span>
        </button>
      </form>

      <!-- Result -->
      <div id="result-card" class="mt-6 hidden">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-lg font-semibold">Result</h2>
          <span
            id="result-badge"
            class="text-xs font-semibold px-2.5 py-1 rounded-full border"
          >
          </span>
        </div>
        <p id="result-text" class="text-sm text-slate-300"></p>
      </div>

      <!-- Error -->
      <p id="error-text" class="mt-3 text-xs text-rose-400 hidden"></p>

      <!-- Footer -->
      <p class="mt-6 text-[11px] text-slate-500 text-center">
        This tool is for educational purposes only and is not a medical device.
        Always consult a qualified doctor for diagnosis.
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('upload-form');
    const fileInput = document.getElementById('image-input');
    const previewContainer = document.getElementById('preview-container');
    const previewImage = document.getElementById('preview-image');
    const resultCard = document.getElementById('result-card');
    const resultBadge = document.getElementById('result-badge');
    const resultText = document.getElementById('result-text');
    const errorText = document.getElementById('error-text');
    const buttonText = document.getElementById('button-text');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      previewImage.src = url;
      previewContainer.classList.remove('hidden');
      resultCard.classList.add('hidden');
      errorText.classList.add('hidden');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = fileInput.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('image', file);

      buttonText.textContent = 'Analyzing...';
      form.querySelector('button').disabled = true;
      errorText.classList.add('hidden');

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Something went wrong');
        }

        resultCard.classList.remove('hidden');
        resultText.textContent =
          data.prediction + ' with confidence ' + data.confidence + '%';

        if (data.prediction.includes('Pneumonia')) {
          resultBadge.textContent = 'PNEUMONIA';
          resultBadge.className =
            'text-xs font-semibold px-2.5 py-1 rounded-full border bg-rose-500/15 border-rose-400/50 text-rose-200';
        } else {
          resultBadge.textContent = 'NORMAL';
          resultBadge.className =
            'text-xs font-semibold px-2.5 py-1 rounded-full border bg-emerald-500/10 border-emerald-400/60 text-emerald-200';
        }
      } catch (err) {
        errorText.textContent = err.message;
        errorText.classList.remove('hidden');
      } finally {
        buttonText.textContent = 'Analyze X‑ray';
        form.querySelector('button').disabled = false;
      }
    });
  </script>
</body>
</html>
